<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sindybot | FinOps Core</title>
    <style>
        :root {
            --bg-body: #f4f5f7;
            --bg-card: #ffffff;
            --text-navy: #0e1337;
            --text-gray: #4a4f6a;
            /* Tema Morado para Sindybot */
            --sindy-title-color: #6d28d9; 
            --sindy-btn-color: #8b5cf6;
            --sindy-btn-hover: #7c3aed;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            padding: 20px;
            color: var(--text-navy);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-bar { width: 100%; max-width: 650px; margin-bottom: 15px; }
        .back-btn { color: var(--text-gray); text-decoration: none; font-size: 0.9rem; font-weight: bold; }
        .back-btn:hover { color: var(--sindy-title-color); }

        .container {
            width: 100%;
            max-width: 650px;
            background: var(--bg-card);
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        h2 { color: var(--text-navy); margin: 0 0 25px 0; font-size: 1.4rem; text-align: center; }
        
        .section-title {
            font-size: 1rem;
            font-weight: 700;
            margin: 25px 0 10px 0;
            color: var(--text-navy);
            border-left: 4px solid var(--sindy-title-color);
            padding-left: 10px;
        }

        label { font-weight: 600; margin-top: 12px; display: block; color: var(--text-gray); font-size: 0.85rem; }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: #fafafa;
            box-sizing: border-box;
        }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-bold {
            width: 100%;
            background-color: var(--sindy-btn-color);
            color: white;
            padding: 16px;
            margin-top: 30px;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-bold:hover { background-color: var(--sindy-btn-hover); transform: translateY(-1px); }

        #mensaje {
            margin-top: 20px;
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-weight: 600;
        }
        .success { background-color: #e6f4ea; color: #1e8e3e; }
        .error { background-color: #fce8e8; color: #c62828; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="index.html" class="back-btn">← Volver al FinOps Core</a>
    </div>

    <div class="container">
        <h2>🦸‍♀️ Sindybot: Provisión de Fraude</h2>
        
        <form id="sindybotForm">
            <div class="section-title">1. Parámetros del Mes</div>
            <div class="input-grid">
                <div>
                    <label>Mes y Año (Ej: 2023_Octubre)</label>
                    <input type="text" id="anio_y_mes" placeholder="2023_Octubre" required>
                </div>
                <div>
                    <label>Puntos Básicos (PBS)</label>
                    <input type="number" id="pbs" value="5" step="0.1" required>
                </div>
            </div>

            <div class="section-title">2. Archivos Base (Links de Drive)</div>
            <p style="font-size: 0.8rem; color: var(--text-gray); margin-bottom: 15px;">Pega los links de Google Drive de los archivos a procesar (Asegúrate de que Sindybot tenga acceso a la carpeta):</p>
            
            <label>Link del Archivo de Porcentajes (.tsv)</label>
            <input type="text" id="link_tsv" placeholder="https://drive.google.com/file/d/1aBcD..." required>

            <label>Link del Archivo de Transacciones (.csv)</label>
            <input type="text" id="link_csv" placeholder="https://drive.google.com/file/d/9xYzW..." required>
            
            <button type="submit" id="btnEnviar" class="btn-bold">🚀 Procesar Provisión</button>
        </form>

        <div id="mensaje"></div>
    </div>

    <script>
        // REEMPLAZA ESTA URL CON LA DE TU CLOUD FUNCTION DE SINDYBOT
        const CLOUD_FUNCTION_URL = "https://TU-REGION-TU-PROYECTO.cloudfunctions.net/sindybot_fraude"; 

        // Función para extraer el ID de un link de Google Drive
        function extractDriveId(url) {
            const match = url.match(/[-\w]{25,}/);
            return match ? match[0] : url; // Si no encuentra el ID, asume que el usuario pegó el ID directamente
        }

        document.getElementById('sindybotForm').addEventListener('submit', async function(e) {
            e.preventDefault(); 
            
            const btn = document.getElementById('btnEnviar');
            const mensajeDiv = document.getElementById('mensaje');

            // UI: Bloquear botón y mostrar carga
            btn.disabled = true;
            btn.innerText = "⏳ Sindybot está haciendo cálculos...";
            mensajeDiv.style.display = "none";

            // Armar el Payload JSON
            const payload = {
                anio_y_mes: document.getElementById('anio_y_mes').value,
                pbs: parseFloat(document.getElementById('pbs').value),
                file_id_tsv: extractDriveId(document.getElementById('link_tsv').value),
                file_id_csv: extractDriveId(document.getElementById('link_csv').value)
            };

            try {
                const response = await fetch(CLOUD_FUNCTION_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    mensajeDiv.style.display = "block";
                    mensajeDiv.className = "success";
                    mensajeDiv.innerHTML = "✅ <b>¡Magia completada!</b> Sindybot guardó el archivo en Drive y notificó al equipo en Slack.";
                    this.reset(); // Limpia el formulario
                } else {
                    const errorText = await response.text();
                    throw new Error(errorText || "Error en el servidor de Google Cloud");
                }
            } catch (error) {
                console.error(error);
                mensajeDiv.style.display = "block";
                mensajeDiv.className = "error";
                mensajeDiv.innerText = "❌ Error: " + error.message;
            } finally {
                btn.disabled = false;
                btn.innerText = "🚀 Procesar Provisión";
            }
        });
    </script>
</body>
</html>
