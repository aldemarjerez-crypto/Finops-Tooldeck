<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isabot | Treasury Deck</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f172a; color: #f8fafc; padding: 20px; margin: 0; }
        .nav-bar { max-width: 500px; margin: 0 auto 20px auto; }
        .back-btn { color: #94a3b8; text-decoration: none; font-size: 0.9rem; font-weight: bold; }
        .container { max-width: 500px; background: #1e293b; padding: 30px; border-radius: 12px; border: 1px solid #334155; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h2 { color: #ec4899; text-align: center; margin-top: 0; }
        label { font-weight: bold; margin-top: 15px; display: block; color: #cbd5e1; }
        input { width: 100%; padding: 12px; margin-top: 5px; background: #0f172a; border: 1px solid #475569; border-radius: 6px; color: white; box-sizing: border-box; font-size: 1.1rem; }
        button { width: 100%; background-color: #ec4899; color: white; padding: 15px; margin-top: 25px; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        button:disabled { background-color: #475569; }
        #mensaje { margin-top: 20px; text-align: center; padding: 10px; border-radius: 6px; display: none; }
        .success { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid #10b981; }
    </style>
</head>
<body>
    <div class="nav-bar"><a href="index.html" class="back-btn">← Volver al Hub</a></div>
    <div class="container">
        <h2>💰 Isabot: Treasury</h2>
        <form id="isabotForm">
            <label>Monto en USD:</label>
            <input type="number" step="0.01" id="monto_usd" placeholder="Ej: 1800000" required>
            
            <label>Tasa de Cambio (TRM):</label>
            <input type="number" step="0.01" id="tasa_cambio" placeholder="Ej: 3668.77" required>
            
            <button type="submit" id="btnEnviar">🚀 Registrar Monetización</button>
        </form>
        <div id="mensaje"></div>
    </div>

    <script>
        const URL_ISA = "https://isabot-treasury-625642864594.europe-west1.run.app";

        document.getElementById('isabotForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            const msg = document.getElementById('mensaje');
            
            btn.disabled = true;
            btn.innerText = "⏳ Enviando a la nube...";

            const datos = {
                monto_usd: parseFloat(document.getElementById('monto_usd').value),
                tasa_cambio: parseFloat(document.getElementById('tasa_cambio').value)
            };

            try {
                const response = await fetch(URL_ISA, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });
                
                if (response.ok) {
                    msg.innerText = "✅ ¡Registrado! Revisa el canal de Slack.";
                    msg.className = "success";
                    msg.style.display = "block";
                    this.reset();
                }
            } catch (error) {
                msg.innerText = "❌ Error de conexión o CORS. Revisa la consola.";
                msg.style.display = "block";
            } finally {
                btn.disabled = false;
                btn.innerText = "🚀 Registrar Monetización";
            }
        });
    </script>
</body>
</html>
