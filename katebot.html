<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katebot | Conciliador</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f172a; color: #f8fafc; padding: 20px; margin: 0; }
        .nav-bar { max-width: 500px; margin: 0 auto 20px auto; }
        .back-btn { color: #94a3b8; text-decoration: none; font-size: 0.9rem; font-weight: bold; }
        .container { max-width: 500px; background: #1e293b; padding: 30px; border-radius: 12px; border: 1px solid #334155; margin: auto; text-align: center; }
        h2 { color: #10b981; margin-top: 0; }
        .upload-area { border: 2px dashed #475569; padding: 40px; border-radius: 12px; margin: 20px 0; cursor: pointer; transition: 0.3s; }
        .upload-area:hover { border-color: #10b981; background: rgba(16, 185, 129, 0.05); }
        input[type="file"] { display: none; }
        button { width: 100%; background-color: #10b981; color: white; padding: 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        button:disabled { background-color: #475569; }
        #mensaje { margin-top: 20px; padding: 10px; border-radius: 6px; display: none; }
        .success { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid #10b981; }
    </style>
</head>
<body>
    <div class="nav-bar"><a href="index.html" class="back-btn">← Volver al Hub</a></div>
    <div class="container">
        <h2>👩‍💻 Katebot: Conciliación</h2>
        <p style="color: #94a3b8;">Sube el extracto del BanRep para iniciar el cruce.</p>
        
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <p id="fileName">📁 Haz clic o arrastra el archivo aquí</p>
            <input type="file" id="fileInput" accept=".xlsx, .xls">
        </div>

        <button id="btnSubir" disabled>🚀 Subir y Conciliar</button>
        <div id="mensaje"></div>
    </div>

    <script>
        const URL_UPLOAD = "TU_NUEVA_URL_DE_FUNCION_SUBIDA"; // La crearemos en el paso 2
        const fileInput = document.getElementById('fileInput');
        const btn = document.getElementById('btnSubir');
        const msg = document.getElementById('mensaje');

        fileInput.onchange = () => {
            if(fileInput.files[0]) {
                document.getElementById('fileName').innerText = "✅ " + fileInput.files[0].name;
                btn.disabled = false;
            }
        };

        btn.onclick = async () => {
            btn.disabled = true;
            btn.innerText = "⏳ Subiendo archivo...";
            
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                const response = await fetch(URL_UPLOAD, {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    msg.innerText = "✅ ¡Archivo en el bucket! Katebot empezará a trabajar ahora mismo.";
                    msg.className = "success";
                    msg.style.display = "block";
                }
            } catch (error) {
                msg.innerText = "❌ Error al subir. Verifica la conexión.";
                msg.style.display = "block";
            } finally {
                btn.disabled = false;
                btn.innerText = "🚀 Subir y Conciliar";
            }
        };
    </script>
</body>
</html>
