<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ledger Flow | Data Injection</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --primary: #4338ca; --text: #1e293b; --muted: #64748b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); padding: 40px; }
        
        .project-config { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 40px; }
        .activity-card { background: #ffffff; border: 1px solid #e2e8f0; padding: 20px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        .var-pill { background: #eff6ff; color: #1e40af; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; font-family: monospace; }
        .btn-inject { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

    <div style="max-width: 800px; margin: 0 auto;">
        <div class="project-config">
            <h2>Inyector de Iniciativas</h2>
            <p style="color: var(--muted); font-size: 14px;">Selecciona un tipo de producto para cargar sus variables y actividades contables automáticamente.</p>
            
            <select id="template-selector" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 20px;">
                <option value="cashin">Producto: Cash-In Bancario</option>
                <option value="crypto">Producto: Crypto Asset (Lending)</option>
            </select>

            <button class="btn-inject" onclick="injectProject()">Inyectar Variables en Ledger</button>
        </div>

        <div id="active-activities">
            <p style="text-align: center; color: var(--muted);">No hay actividades cargadas.</p>
        </div>
    </div>

    <script>
        // Esta es la "inteligencia" que vendría de Firebase
        const templates = {
            cashin: [
                { task: "Validación de Cuenta Corriente", owner: "Tesorería", variable: "ACCOUNT_NUMBER" },
                { task: "Mapeo de Journal Code SAP", owner: "Contabilidad", variable: "SAP_J_CODE" },
                { task: "Configuración de GMF / IVA", owner: "Taxes", variable: "TAX_RULE_ID" }
            ],
            crypto: [
                { task: "Custodia de Keys", owner: "InfoSec", variable: "VAULT_ADDR" },
                { task: "Cálculo de LTV Contable", owner: "FinOps", variable: "LTV_RATIO" },
                { task: "Evento de Liquidación", owner: "Ledger Tech", variable: "LIQ_EVENT_ID" }
            ]
        };

        function injectProject() {
            const type = document.getElementById('template-selector').value;
            const activities = templates[type];
            const container = document.getElementById('active-activities');
            
            container.innerHTML = `<h3 style="margin-bottom:20px;">Actividades Inyectadas para ${type.toUpperCase()}</h3>`;
            
            activities.forEach(item => {
                const card = document.createElement('div');
                card.className = 'activity-card';
                card.innerHTML = `
                    <div>
                        <strong style="display:block">${item.task}</strong>
                        <small style="color: var(--muted)">Responsable: ${item.owner}</small>
                    </div>
                    <div>
                        <span class="var-pill">VAR: ${item.variable}</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
