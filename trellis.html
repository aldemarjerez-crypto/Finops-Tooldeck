<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ledger OS | High-Performance Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f4f8; --primary: #2563eb; --cyan: #06b6d4;
            --orange: #f97316; --success: #10b981; --text: #1e293b;
            --muted: #64748b; --card: #ffffff;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }

        /* Header Dinámico y Alegre */
        .header { background: linear-gradient(135deg, var(--primary), var(--cyan)); padding: 30px; border-radius: 24px; color: white; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; box-shadow: 0 10px 25px rgba(37, 99, 235, 0.2); }
        .header h1 { margin: 0; font-size: 28px; }
        
        /* Stats Previsivos */
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 20px; border-bottom: 4px solid var(--primary); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stat-label { font-size: 10px; text-transform: uppercase; font-weight: 800; color: var(--muted); letter-spacing: 1px; }
        .stat-value { font-size: 24px; font-weight: 700; display: block; margin-top: 5px; }

        /* Iniciativa Card - Lo que necesitabas ver */
        .initiative-card { background: var(--card); border-radius: 24px; padding: 25px; margin-bottom: 20px; border: 1px solid #e2e8f0; transition: 0.3s; }
        .initiative-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .tag-status { padding: 4px 12px; border-radius: 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; }

        /* INYECCIÓN DE VARIABLES - Aquí está el valor */

        .var-item { display: flex; flex-direction: column; }
        .var-label { font-size: 10px; font-weight: 800; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; }
        .var-value { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--primary); font-weight: 600; background: white; padding: 6px 10px; border-radius: 6px; border: 1px solid #e2e8f0; }
        .var-empty { color: var(--orange); font-style: italic; border-color: var(--orange); }
