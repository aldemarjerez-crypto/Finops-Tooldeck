<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valenbot | FinOps Core</title>
    <style>
        :root {
            --bg-body: #f4f5f7;
            --bg-card: #ffffff;
            --text-navy: #0e1337;
            --text-gray: #4a4f6a;
            --bold-title-color: #c41c49;
            --bold-btn-color: #ff8fab;
            --bold-btn-hover: #ff7596;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            padding: 20px;
            color: var(--text-navy);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-bar { width: 100%; max-width: 650px; margin-bottom: 15px; }
        .back-btn { color: var(--text-gray); text-decoration: none; font-size: 0.9rem; font-weight: bold; }
        .back-btn:hover { color: var(--bold-title-color); }

        .container {
            width: 100%;
            max-width: 650px;
            background: var(--bg-card);
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        h2 { color: var(--text-navy); margin: 0 0 25px 0; font-size: 1.4rem; text-align: center; }
        
        .section-title {
            font-size: 1rem;
            font-weight: 700;
            margin: 25px 0 10px 0;
            color: var(--text-navy);
            border-left: 4px solid var(--bold-title-color);
            padding-left: 10px;
        }

        label { font-weight: 600; margin-top: 12px; display: block; color: var(--text-gray); font-size: 0.85rem; }

        input[type="text"], input[type="number"], input[type="file"] {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: #fafafa;
            box-sizing: border-box;
        }

        .checkpoint-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            background: #f9fafb;
            padding: 15px;
            border-radius: 10px;
        }

        .btn-bold {
            width: 100%;
            background-color: var(--bold-btn-color);
            color: white;
            padding: 16px;
            margin-top: 30px;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-bold:hover { background-color: var(--bold-btn-hover); transform: translateY(-1px); }

        #mensaje {
            margin-top: 20px;
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-weight: 600;
        }
        .success { background-color: #e6f4ea; color: #1e8e3e; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="index.html" class="back-btn">← Volver al FinOps Core</a>
    </div>

    <div class="container">
        <h2>🤖 Valenbot: Conciliación PSE</h2>
        
        <form id="valenbotForm">
            <div class="section-title">1. Carga de Archivos (.Rec)</div>
            <label>Selecciona los 5 archivos del día:</label>
            <input type="file" name="archivos_rec" accept=".Rec" multiple required>

            <div class="section-title">2. Checkpoint (Valores Portal PSE)</div>
            <p style="font-size: 0.8rem; color: var(--text-gray); margin-bottom: 15px;">Ingresa los montos totales de cada ciclo para validación:</p>
            
            <div class="checkpoint-grid">
                <input type="number" name="ciclo1" placeholder="Monto Ciclo 1" step="0.01" required>
                <input type="number" name="ciclo2" placeholder="Monto Ciclo 2" step="0.01" required>
                <input type="number" name="ciclo3" placeholder="Monto Ciclo 3" step="0.01" required>
                <input type="number" name="ciclo4" placeholder="Monto Ciclo 4" step="0.01" required>
                <input type="number" name="ciclo5" placeholder="Monto Ciclo 5" step="0.01" required>
            </div>
            
            <button type="submit" id="btnEnviar" class="btn-bold">Validar y Procesar Valenbot</button>
        </form>

        <div id="mensaje"></div>
    </div>

    <script>
        const CLOUD_RUN_URL = "https://valenbot...run.app/?token=token-por-defecto-123"; 

        document.getElementById('valenbotForm').addEventListener('submit', async function(e) {
            e.preventDefault(); 
            const btn = document.getElementById('btnEnviar');
            const mensajeDiv = document.getElementById('mensaje');

            btn.disabled = true;
            btn.innerText = "⏳ Procesando ciclos...";

            // Simulación de envío
            setTimeout(() => {
                mensajeDiv.style.display = "block";
                mensajeDiv.innerText = "✅ ¡Éxito! Los 5 ciclos fueron validados contra el portal y el reporte se envió a Slack.";
                mensajeDiv.className = "success";
                btn.disabled = false;
                btn.innerText = "Validar y Procesar Valenbot";
            }, 3000);
        });
    const CLOUD_RUN_URL = "https://valenbot-pse-cashin-settlement-625642864594.europe-west1.run.app/?token=token-por-defecto-123"; 

    document.getElementById('valenbotForm').addEventListener('submit', async function(e) {
        e.preventDefault(); 
        
        const btn = document.getElementById('btnEnviar');
        const mensajeDiv = document.getElementById('mensaje');
        const formData = new FormData(this);

        // UI: Bloquear botón y mostrar carga
        btn.disabled = true;
        btn.innerText = "⏳ Procesando ciclos en Google Cloud...";
        mensajeDiv.style.display = "none";

        try {
            const response = await fetch(CLOUD_RUN_URL, {
                method: 'POST',
                body: formData // Esto envía archivos y campos de texto automáticamente
            });

            if (response.ok) {
                // Si el servidor devuelve un archivo (el CSV conciliado)
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "conciliacion_finalizada.csv";
                document.body.appendChild(a);
                a.click();
                a.remove();

                mensajeDiv.style.display = "block";
                mensajeDiv.className = "success";
                mensajeDiv.innerText = "✅ ¡Procesado! El archivo se descargó y el reporte se envió a Slack.";
            } else {
                const errorText = await response.text();
                throw new Error(errorText || "Error en el servidor");
            }
        } catch (error) {
            console.error(error);
            mensajeDiv.style.display = "block";
            mensajeDiv.className = "error";
            mensajeDiv.innerText = "❌ Error: " + error.message;
        } finally {
            btn.disabled = false;
            btn.innerText = "Validar y Procesar Valenbot";
        }
    });
</script>
</body>
</html>
